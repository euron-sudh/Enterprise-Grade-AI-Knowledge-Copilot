name: Frontend — Deploy to AWS Amplify

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    steps:
      - name: CI passed
        run: echo "Frontend CI passed — proceeding with deployment."

  # ── 1. Resolve environment ────────────────────────────────────────────────────
  setup:
    name: Resolve Environment
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      amplify_branch: ${{ steps.resolve.outputs.amplify_branch }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          # Branch mapping: dev env → develop branch in Amplify, prod → main
          if [ "$ENV" = "prod" ]; then
            BRANCH="main"
          else
            BRANCH="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "amplify_branch=$BRANCH" >> $GITHUB_OUTPUT

  # ── 2. Trigger Amplify build ──────────────────────────────────────────────────
  deploy:
    name: Trigger Amplify Build (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger Amplify build
        id: trigger
        run: |
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          BRANCH=${{ needs.setup.outputs.amplify_branch }}
          # If a build is already running, reuse it instead of failing
          JOB=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text 2>/dev/null) || true
          if [ -z "$JOB" ] || [ "$JOB" = "None" ]; then
            echo "A build is already running — fetching latest job ID..."
            JOB=$(aws amplify list-jobs \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --max-results 1 \
              --query 'jobSummaries[0].jobId' \
              --output text)
            echo "Reusing existing Amplify job: $JOB"
          else
            echo "Amplify build triggered: job $JOB"
          fi
          echo "job_id=$JOB" >> $GITHUB_OUTPUT

      - name: Wait for Amplify build to complete
        run: |
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          BRANCH=${{ needs.setup.outputs.amplify_branch }}
          JOB_ID=${{ steps.trigger.outputs.job_id }}
          echo "Waiting for Amplify job $JOB_ID on branch $BRANCH..."

          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id $APP_ID \
              --branch-name $BRANCH \
              --job-id $JOB_ID \
              --query 'job.summary.status' \
              --output text)
            echo "[$i/30] Status: $STATUS"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Amplify build succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Amplify build $STATUS."
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for Amplify build."
          exit 1

  # ── 3. Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    if: always()
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Amplify deployment succeeded for branch ${{ needs.setup.outputs.amplify_branch }}"
          else
            echo "❌ Amplify deployment failed — check Amplify console for details"
            exit 1
          fi
