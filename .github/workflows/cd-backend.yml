name: Backend — Build & Deploy to ECS

on:
  # Gate: only deploy after CI passes on the same push
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── 0. Gate: abort if CI failed ───────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI passed
        run: echo "CI passed — proceeding with deployment."

  # ── 1. Resolve environment ────────────────────────────────────────────────────
  setup:
    name: Resolve Environment
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      ecs_cluster: ${{ steps.resolve.outputs.ecs_cluster }}
      ecs_service: ${{ steps.resolve.outputs.ecs_service }}
      task_family: ${{ steps.resolve.outputs.task_family }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "ecs_cluster=knowledgeforge-$ENV" >> $GITHUB_OUTPUT
          echo "ecs_service=knowledgeforge-backend-$ENV" >> $GITHUB_OUTPUT
          echo "task_family=knowledgeforge-backend-$ENV" >> $GITHUB_OUTPUT

  # ── 2. Build & push Docker image to ECR ──────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      id-token: write   # required for OIDC
      contents: read
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if image already exists in ECR
        id: image-check
        run: |
          if aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --query 'imageDetails[0].imageTags' \
            --output text 2>/dev/null | grep -q "${{ env.IMAGE_TAG }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists in ECR, skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        id: push
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image URI
        run: echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # ── 3. Deploy to ECS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ needs.setup.outputs.task_family }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: knowledgeforge-backend
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Register new task definition revision
        id: register
        run: |
          REVISION=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$REVISION" >> $GITHUB_OUTPUT

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ needs.setup.outputs.ecs_service }}
          cluster: ${{ needs.setup.outputs.ecs_cluster }}
          wait-for-service-stability: true

      - name: Verify health check
        run: |
          echo "Waiting 30s for new tasks to pass health checks..."
          sleep 30
          aws ecs describe-services \
            --cluster ${{ needs.setup.outputs.ecs_cluster }} \
            --services ${{ needs.setup.outputs.ecs_service }} \
            --query 'services[0].{running:runningCount,desired:desiredCount,status:status}' \
            --output table

  # ── 4. Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()
    steps:
      - name: Slack alert
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: KnowledgeForge backend deployment failed",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*:x: Backend Deploy Failed*\n*Branch:* ${{ github.ref_name }}\n*Commit:* `${{ github.sha }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
