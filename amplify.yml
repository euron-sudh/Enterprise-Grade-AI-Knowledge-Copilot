version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - export NODE_ENV=development
            - npm ci
        build:
          commands:
            - export NEXT_TELEMETRY_DISABLED=1
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
    appRoot: frontend
